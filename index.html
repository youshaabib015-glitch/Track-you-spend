<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Track your spend</title>
  <link rel="stylesheet" href="./bootstrap-5.0.2-dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <nav class="navbar bg-dark">
    <div class="container-fluid">
      <i><a class="navbar-brand fs-4" style="color: white; ">Ex<span style="color: burlywood;">pend</span>iture</a></i>
      <div class="d-flex">
        <p class="mt-2 fs-5" id="showdate" style="color: white;"></p>
      </div>
    </div>
  </nav>
  <div class="container mt-5">
    <table border="1" class="table1" id="expenses">
  <tr>
    <th>
      <pre>Total Expenses
<span id="totalExpenses" class="fs-1" style="color: crimson;">$0.00</span></pre>
    </th>
    <th style="background-color: black;">
      <pre style="color: gray">Net Balance
<span id="netBalance" class="fs-1" style="color: rgb(223, 206, 55);">$0.00</span></pre>
    </th>
    <th>
      <pre>Total income
<span id="totalIncome" class="fs-1" style="color: rgb(16, 87, 16);">$0.00</span></pre>
    </th>
  </tr>
</table>
  </div>
  <div class="container mt-5">
    <table border="1" class="table1" style="text-align: center;">
  <tr>
    <th class="fs-4">Add Transaction</th>
  </tr>
    <td>
      <form>
        <label>Description</label><br>
        <input type="text" placeholder="e.g. Coffee, Rent, Salary…">
      </form>
    </td>
    <td>
      <form>
        <label>Amount ($)</label><br>
        <input type="number" id="amount" placeholder="0.00" min="0.01" step="0.01">
      </form>
    </td>
    <td>
      <form>
        <label>Category</label><br>
        <select id="category">
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Housing">Housing</option>
          <option value="Health">Health</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Shopping">Shopping</option>
          <option value="Income">Income</option>
          <option value="Other">Other</option>
        </select>
      </form>
    </td>
    <td>
      <button class="btn-add" id="addButton">+ Add</button>
    </td>
  </tr>
</table>
  </div>
  <div class="container mt-3">
    <ul class="nav">
  <li class="nav-item p-2">
    <a class="nav-link active" id="custom" aria-current="page" data-catergory="all" href="#">All</a>
  </li>
  <li class="nav-item p-2">
    <a class="nav-link" id="custom" data-category="expenses" href="#">EXPENSES</a>
  </li>
  <li class="nav-item p-2">
    <a class="nav-link" id="custom" data-category="income" href="#">INCOME</a>
  </li>
  <li class="nav-item p-2">
    <a class="nav-link" id="custom" data-category="food" href="#">FOOD</a>
  </li>
  <li class="nav-item p-2">
    <a class="nav-link" id="custom" data-category="transport" href="#">TRANSPORT</a>
  </li>
  <li class="nav-item p-2">
    <a class="nav-link" id="custom" data-category="housing" href="#">HOUSING</a>
  </li>
  <li class="nav-item p-2">
    <a class="nav-link" id="custom" data-category="entertainment" href="#">ENTERTAINMENT</a>
  </li>
  
</ul>
  </div>
  <div class="container mt-5">
    <table border="1" class="table2" style="width: 100%;">
  <thead>
    <tr>
      <th>Description</th>
      <th>Category</th>
      <th>Amount</th>
      <th>Delete</th>
    </tr>
  </thead>
  <tbody id="elements">
    
  </tbody>
</table>
  </div>
  <div class="container mt-5">
    <table border="1" class="table3" style="width: 100%;">
  <thead>
    <tr>
      <th>Spending By Category</th>
    </tr>
  </thead>
  <tbody id="element2">
    
  </tbody>
</table>
  </div>

  <script src="./bootstrap-5.0.2-dist/js/bootstrap.bundle.min.js"></script>
  <script src="./script.js"></script>
</body>

</html>
